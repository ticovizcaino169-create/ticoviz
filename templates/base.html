<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TicoViz Corporation{% endblock %}</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --bg-card: rgba(255,255,255,0.04);
            --bg-card-hover: rgba(255,255,255,0.07);
            --primary: #1a1a2e;
            --accent: #e94560;
            --accent2: #0f3460;
            --glow: rgba(233,69,96,0.25);
            --text: #e0e0e0;
            --muted: #888;
            --border: rgba(255,255,255,0.08);
            --grad: linear-gradient(135deg, #e94560, #0f3460);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* NAV */
        .nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem 2rem;
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-brand {
            font-size: 1.3rem; font-weight: 700;
            background: var(--grad); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 1.5rem; }
        .nav-links a {
            color: var(--muted); font-size: 0.9rem;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--text); text-decoration: none; }

        /* LAYOUT */
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
        .container-sm { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* GLASS CARD */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.3s;
        }
        .card:hover { background: var(--bg-card-hover); }

        /* BUTTONS */
        .btn {
            display: inline-block; padding: 12px 32px;
            border-radius: 8px; font-weight: 600;
            font-size: 1rem; cursor: pointer;
            transition: all 0.3s; border: none;
            text-align: center;
        }
        .btn-primary {
            background: var(--grad); color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--glow);
            text-decoration: none;
        }
        .btn-outline {
            background: transparent; color: var(--accent);
            border: 1px solid var(--accent);
        }
        .btn-outline:hover {
            background: rgba(233,69,96,0.1);
            text-decoration: none;
        }

        /* FORMS */
        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block; margin-bottom: 0.5rem;
            font-weight: 600; font-size: 0.9rem;
        }
        .form-control {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px; color: var(--text);
            font-size: 1rem; transition: border-color 0.3s;
            font-family: inherit;
        }
        .form-control:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--glow);
        }
        select.form-control { appearance: auto; }
        textarea.form-control { resize: vertical; min-height: 100px; }

        /* ALERTS */
        .alert {
            padding: 1rem 1.2rem; border-radius: 8px;
            margin-bottom: 1.5rem; font-size: 0.9rem;
        }
        .alert-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
        }
        .alert-success {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.3);
            color: #6ee7b7;
        }
        .alert-warning {
            background: rgba(245,158,11,0.08);
            border: 1px solid rgba(245,158,11,0.2);
            color: #fbbf24;
        }

        /* BADGES */
        .badge {
            display: inline-block; padding: 4px 12px;
            border-radius: 20px; font-size: 0.8rem; font-weight: 600;
        }
        .badge-success { background: rgba(16,185,129,0.15); color: #6ee7b7; }
        .badge-warning { background: rgba(245,158,11,0.15); color: #fbbf24; }
        .badge-error { background: rgba(239,68,68,0.15); color: #fca5a5; }
        .badge-info { background: rgba(59,130,246,0.15); color: #93c5fd; }

        /* FOOTER */
        .footer {
            text-align: center; padding: 2rem;
            color: var(--muted); font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }

        /* CODE */
        code {
            background: rgba(255,255,255,0.08);
            padding: 2px 8px; border-radius: 4px;
            font-size: 0.85rem; font-family: 'Consolas', monospace;
        }

        @media (max-width: 768px) {
            .nav { padding: 0.8rem 1rem; }
            .nav-links { gap: 1rem; }
            .container, .container-sm { padding: 1rem; }
            .card { padding: 1.5rem; }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">TicoViz Corporation</a>
        <div class="nav-links">
            <a href="/">Inicio</a>
            <a href="/pedir">Hacer Pedido</a>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="footer">
        <p>TicoViz Corporation &mdash; Productos Digitales con IA</p>
    </footer>
</body>
</html>
